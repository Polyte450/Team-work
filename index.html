<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETA TECH Solution</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        header {
            background-color: #1e3a8a;
            padding: 15px 0;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            padding: 8px 12px;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav ul li a:hover {
            background-color: #2563eb;
        }

        main {
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #1e3a8a;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <ul>
            <li><a href="#">User Login Form</a></li>
            <li><a href="#">Employee Registration Form</a></li>
            <li><a href="#">Product Registration Form</a></li>
            <li><a href="#">Customer Feedback Form</a></li>
            <li><a href="#">Event Booking Form</a></li>
        </ul>
    </nav>
</header>

<main>
    <h1>Welcome to BETA TECH Solution</h1>
    <p>Select a form from the navigation menu above.</p>
</main>

</body>
</html>
